<!DOCTYPE html>
<html>
<head>
    <title>Vigil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Fragment+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020912; color: #c0cfe4; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [alerts, setAlerts] = React.useState([]);

            React.useEffect(() => {
                fetch("/alerts")
                    .then(r => r.json())
                    .then(setAlerts);
            }, []);

            return (
                <div style={{ minHeight: "100vh", background: "#020912" }}>
                    <div style={{ background: "rgba(59,130,246,0.05)", borderBottom: "1px solid rgba(59,130,246,0.1)", padding: "7px 28px", display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#3b82f6" }} />
                        <span style={{ fontFamily: "Fragment Mono", fontSize: 9, color: "#3b82f6", letterSpacing: "0.12em" }}>REGIME: TRENDING</span>
                    </div>

                    <div style={{ padding: "14px 28px", borderBottom: "1px solid #050f1e", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontFamily: "Crimson Pro", fontSize: 22, color: "#e2e8f0", fontWeight: 300 }}>Vigil</span>
                        <span style={{ fontFamily: "Fragment Mono", fontSize: 9, color: "#1e3a5f" }}>Market Intelligence Alert System</span>
                    </div>

                    <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 28px" }}>
                        <h1 style={{ fontFamily: "Crimson Pro", fontSize: 30, fontWeight: 300, color: "#dde8f5", marginBottom: 6 }}>Alert Feed</h1>
                        <p style={{ fontFamily: "Fragment Mono", fontSize: 9, color: "#1e3a5f", marginBottom: 28 }}>{alerts.length} alerts · System watching</p>

                        {alerts.length === 0 ? (
                            <div style={{ border: "1px dashed #0a1628", borderRadius: 6, padding: "40px 22px", textAlign: "center" }}>
                                <span style={{ fontFamily: "Fragment Mono", fontSize: 24, color: "#0a1628", display: "block", marginBottom: 14 }}>◌</span>
                                <span style={{ fontFamily: "Fragment Mono", fontSize: 10, color: "#1e3a5f", letterSpacing: "0.14em" }}>SILENCE AS SIGNAL</span>
                                <p style={{ fontFamily: "Crimson Pro", fontSize: 14, fontStyle: "italic", color: "#1e3a5f", marginTop: 10, lineHeight: 1.8 }}>No signals today. Staying out is correct.</p>
                            </div>
                        ) : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                {alerts.map(alert => {
                                    const isUp = alert.signal_type === "VOLUME_SPIKE_UP";
                                    const color = isUp ? "#22c55e" : "#dc2626";
                                    return (
                                        <div key={alert.id} style={{ background: "#030812", border: `1px solid ${color}30`, borderRadius: 6, padding: "18px 22px", position: "relative" }}>
                                            <div style={{ position: "absolute", left: 0, top: "15%", bottom: "15%", width: 2, background: color, borderRadius: 2 }} />
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                                    <span style={{ fontFamily: "Fragment Mono", fontSize: 15, fontWeight: 600, color: "#e2e8f0" }}>{alert.ticker}</span>
                                                    <div style={{ background: `${color}15`, border: `1px solid ${color}30`, borderRadius: 4, padding: "4px 11px" }}>
                                                        <span style={{ fontFamily: "Fragment Mono", fontSize: 11, color, letterSpacing: "0.12em" }}>
                                                            {isUp ? "▲ VOLUME SPIKE UP" : "▼ VOLUME SPIKE DOWN"}
                                                        </span>
                                                    </div>
                                                    <span style={{ fontFamily: "Fragment Mono", fontSize: 9, color: "#334155", background: "#0a1628", padding: "2px 8px", borderRadius: 2 }}>{alert.state || "TRENDING_DOWN"}</span>
                                                </div>
                                                <span style={{ fontFamily: "Fragment Mono", fontSize: 9, color: "#1e3a5f" }}>{alert.date}</span>
                                            </div>
                                            <p style={{ fontFamily: "Crimson Pro", fontSize: 15, color: "#c0cfe4", fontWeight: 300, lineHeight: 1.45 }}>
                                                Volume {alert.volume_ratio}× average · Price {isUp ? "+" : ""}{alert.change_pct}%
                                            </p>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>

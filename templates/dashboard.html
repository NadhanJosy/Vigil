<!DOCTYPE html>
<html lang="en" class="bg-[#050506] text-[#EDEDEF] antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigil // Institutional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Geist Mono', 'monospace'] },
                    colors: {
                        accent: '#5E6AD2',
                        'accent-bright': '#6872D9',
                        'bg-base': '#050506',
                        'bg-deep': '#020203',
                        'border-default': 'rgba(255,255,255,0.06)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 10s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(1deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Layered Background System */
        .bg-mesh {
            background: radial-gradient(ellipse at top, #0a0a0f 0%, #050506 50%, #020203 100%);
            position: fixed; inset: 0; z-index: -10;
        }
        .bg-grid {
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
            position: fixed; inset: 0; z-index: -9;
        }
        .noise {
            position: fixed; inset: 0; z-index: -8; opacity: 0.015; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Animated Light Pools */
        .blob {
            position: fixed; width: 900px; height: 1400px;
            background: radial-gradient(circle, rgba(94,106,210,0.15) 0%, transparent 70%);
            filter: blur(120px); z-index: -7; pointer-events: none;
        }

        /* Precision Micro-interactions */
        .card-spotlight {
            position: relative;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 20px rgba(0,0,0,0.4);
        }
        .card-spotlight:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 8px 40px rgba(0,0,0,0.5), 0 0 80px rgba(94,106,210,0.05);
        }
        
        .spotlight-glow {
            position: absolute; inset: 0; pointer-events: none; opacity: 0;
            transition: opacity 0.5s ease;
            background: radial-gradient(300px circle at var(--x) var(--y), rgba(94,106,210,0.15), transparent 80%);
        }
        .card-spotlight:hover .spotlight-glow { opacity: 1; }

        .headline-gradient {
            background: linear-gradient(to bottom, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen">
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="noise"></div>
    <div class="blob top-[-20%] left-[10%] animate-float"></div>
    <div class="blob bottom-[-20%] right-[5%] animate-pulse-slow"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-white/[0.06] bg-[#050506]/80 backdrop-blur-xl">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <span class="text-xl font-semibold tracking-tighter headline-gradient">VIGIL</span>
                <div class="hidden md:flex gap-6 text-sm text-[#8A8F98]">
                    <a href="/" class="hover:text-white transition-colors">Dashboard</a>
                    <a href="/watchlist" class="hover:text-white transition-colors">Watchlist</a>
                    <a href="/legacy" class="hover:text-white transition-colors">Legacy View</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="market-regime" class="text-[10px] font-mono tracking-widest uppercase px-2 py-1 rounded-full border border-accent/30 bg-accent/10 text-accent">
                    SCANNING...
                </span>
                <button onclick="triggerDetection()" class="text-xs bg-accent hover:bg-accent-bright px-4 py-2 rounded-lg font-medium transition-all active:scale-95 shadow-[0_0_0_1px_rgba(94,106,210,0.5),0_4px_12px_rgba(94,106,210,0.3)]">
                    Run Pulse
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <!-- Hero Metrics (Asymmetric Bento Grid) -->
        <section class="grid grid-cols-1 md:grid-cols-6 gap-6 mb-16">
            <div class="md:col-span-4 card-spotlight p-8 rounded-2xl flex flex-col justify-between min-h-[240px]">
                <div>
                    <h1 class="text-4xl md:text-5xl font-semibold tracking-tight headline-gradient mb-2">Alpha Engine</h1>
                    <p class="text-[#8A8F98] max-w-md">Institutional performance metrics derived from multi-timeframe divergence and alpha generation.</p>
                </div>
                <div class="flex gap-12 mt-8">
                    <div>
                        <span class="text-xs font-mono tracking-widest text-[#8A8F98] block mb-1">PROFIT FACTOR</span>
                        <span id="stat-profit-factor" class="text-3xl font-semibold">0.00</span>
                    </div>
                    <div>
                        <span class="text-xs font-mono tracking-widest text-[#8A8F98] block mb-1">SHARPE RATIO</span>
                        <span id="stat-sharpe" class="text-3xl font-semibold text-accent">0.00</span>
                    </div>
                    <div>
                        <span class="text-xs font-mono tracking-widest text-[#8A8F98] block mb-1">WIN RATE</span>
                        <span id="stat-win-rate" class="text-3xl font-semibold">0%</span>
                    </div>
                </div>
                <div class="spotlight-glow"></div>
            </div>
            <div class="md:col-span-2 card-spotlight p-8 rounded-2xl flex flex-col items-center justify-center text-center">
                <span class="text-xs font-mono tracking-widest text-[#8A8F98] mb-4 uppercase">System Health</span>
                <div class="w-24 h-24 rounded-full border-4 border-accent/20 flex items-center justify-center relative">
                    <div class="absolute inset-0 rounded-full border-t-4 border-accent animate-spin"></div>
                    <span id="active-tickers" class="text-2xl font-semibold">0</span>
                </div>
                <p class="mt-4 text-sm text-[#8A8F98]">Active Tickers Monitored</p>
                <div class="spotlight-glow"></div>
            </div>
        </section>

        <!-- Alert Feed -->
        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-semibold tracking-tight">Active Intelligence</h2>
                <div class="flex gap-2">
                    <input type="text" placeholder="Filter ticker..." class="bg-white/[0.05] border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-accent transition-colors">
                </div>
            </div>

            <div id="alerts-container" class="space-y-4">
                <!-- Alerts injected here -->
                <div class="animate-pulse space-y-4">
                    <div class="h-32 card-spotlight rounded-2xl"></div>
                    <div class="h-32 card-spotlight rounded-2xl"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Mouse tracking for spotlight effect
        document.addEventListener('mousemove', e => {
            document.querySelectorAll('.card-spotlight').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);
            });
        });

        async function fetchData() {
            try {
                const [alertsRes, statsRes, regimeRes] = await Promise.all([
                    fetch('/alerts?limit=20'),
                    fetch('/stats'),
                    fetch('/regime')
                ]);

                const alerts = await alertsRes.json();
                const stats = await statsRes.json();
                const regimeData = await regimeRes.json();

                updateStats(stats);
                updateRegime(regimeData.regime);
                renderAlerts(alerts);
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function updateStats(stats) {
            document.getElementById('stat-profit-factor').innerText = stats.profit_factor || '0.00';
            document.getElementById('stat-sharpe').innerText = stats.sharpe || '0.00';
            document.getElementById('stat-win-rate').innerText = `${stats.win_rate || 0}%`;
            document.getElementById('active-tickers').innerText = stats.total_trades || '0';
        }

        function updateRegime(regime) {
            const el = document.getElementById('market-regime');
            el.innerText = regime;
            const colors = {
                'TRENDING': 'border-emerald-500/30 bg-emerald-500/10 text-emerald-400',
                'RISK_OFF': 'border-red-500/30 bg-red-500/10 text-red-400',
                'VOLATILE': 'border-amber-500/30 bg-amber-500/10 text-amber-400',
                'SIDEWAYS': 'border-accent/30 bg-accent/10 text-accent'
            };
            el.className = `text-[10px] font-mono tracking-widest uppercase px-2 py-1 rounded-full border ${colors[regime] || colors['SIDEWAYS']}`;
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alerts-container');
            if (alerts.length === 0) {
                container.innerHTML = `<div class="p-12 text-center text-[#8A8F98]">No signals detected in the current window.</div>`;
                return;
            }

            container.innerHTML = alerts.map(alert => {
                const actionColor = alert.action === 'ENTER' ? 'text-emerald-400' : (alert.action === 'AVOID' ? 'text-red-400' : 'text-accent');
                const edgeClass = alert.edge_score >= 8 ? 'border-accent/50 bg-accent/5' : '';
                
                return `
                    <div class="card-spotlight rounded-2xl p-6 group ${edgeClass}">
                        <div class="flex flex-col md:flex-row gap-6 justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="text-2xl font-bold tracking-tight">${alert.ticker}</span>
                                    <span class="text-[10px] font-mono px-2 py-0.5 rounded border border-white/10 bg-white/5 uppercase">${alert.signal_combination}</span>
                                    ${alert.edge_score >= 8 ? '<span class="text-[10px] font-mono px-2 py-0.5 rounded border border-emerald-500/30 bg-emerald-500/10 text-emerald-400">ELITE SETUP</span>' : ''}
                                </div>
                                <p class="text-sm text-[#8A8F98] leading-relaxed max-w-2xl">${alert.summary}</p>
                                
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-6">
                                    <div>
                                        <span class="text-[10px] font-mono text-[#8A8F98] block uppercase">Execution</span>
                                        <span class="text-sm font-semibold ${actionColor}">${alert.action}</span>
                                    </div>
                                    <div>
                                        <span class="text-[10px] font-mono text-[#8A8F98] block uppercase">Edge Score</span>
                                        <span class="text-sm font-semibold">${alert.edge_score.toFixed(1)}/10</span>
                                    </div>
                                    <div>
                                        <span class="text-[10px] font-mono text-[#8A8F98] block uppercase">MTF Context</span>
                                        <span class="text-sm font-semibold text-[#EDEDEF]">${alert.mtf_alignment.replace('_', ' ')}</span>
                                    </div>
                                    <div>
                                        <span class="text-[10px] font-mono text-[#8A8F98] block uppercase">Age</span>
                                        <div class="flex items-center gap-2 mt-1">
                                            <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                                                <div class="bg-accent h-full" style="width: ${alert.decay.pct}%"></div>
                                            </div>
                                            <span class="text-[10px] font-mono">${alert.decay.status}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="md:w-48 flex flex-col justify-between border-t md:border-t-0 md:border-l border-white/[0.06] pt-4 md:pt-0 md:pl-6">
                                <div class="space-y-3">
                                    <div class="flex justify-between text-xs">
                                        <span class="text-[#8A8F98]">Vol Ratio</span>
                                        <span class="font-mono text-emerald-400">${alert.volume_ratio}x</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span class="text-[#8A8F98]">Outcome</span>
                                        <span class="font-mono ${alert.outcome_pct > 0 ? 'text-emerald-400' : 'text-red-400'}">
                                            ${alert.outcome_pct ? alert.outcome_pct.toFixed(1) + '%' : 'PENDING'}
                                        </span>
                                    </div>
                                </div>
                                <button class="mt-4 w-full py-2 rounded-lg border border-white/10 text-[10px] font-mono uppercase hover:bg-white/5 transition-colors">
                                    View Analysis
                                </button>
                            </div>
                        </div>
                        <div class="spotlight-glow"></div>
                    </div>
                `;
            }).join('');
        }

        function triggerDetection() {
            fetch('/trigger')
                .then(() => {
                    alert("Pulse triggered. Analyzing global markets...");
                    setTimeout(fetchData, 3000);
                });
        }

        // Initial load and poll
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
